# 로컬 단일 서비스. 8009 포트로 노출, DB는 named volume에 영속.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: apt-analysis-seoul
    container_name: apt-analysis-seoul
    ports:
      - "8009:8009"
    environment:
      # 첫 기동 시딩 범위(24개월). 빠른 확인용으로 줄이려면 여기서 변경.
      # 24개월이라 첫 시딩은 수십 분 — 줄이려면 끝쪽 6~12개월만 남기면 됨.
      SEED_ON_START: "1"
      SEED_MONTHS: "202406 202407 202408 202409 202410 202411 202412 202501 202502 202503 202504 202505 202506 202507 202508 202509 202510 202511 202512 202601 202602 202603 202604 202605"
    volumes:
      # DB만 영속 — 코드는 이미지에 포함. 한 번 시딩하면 재기동은 즉시.
      - seoul_db:/data
    restart: unless-stopped

volumes:
  seoul_db:
