# 로컬 단일 서비스. 8009 포트로 노출, DB는 named volume에 영속.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: apt-analysis-seoul
    container_name: apt-analysis-seoul
    ports:
      - "8009:8009"
    environment:
      # 첫 기동 시딩 범위. 빠른 확인용으로 줄이려면 여기서 변경.
      SEED_ON_START: "1"
      SEED_MONTHS: "202512 202601 202602 202603 202604 202605"
    volumes:
      # DB만 영속 — 코드는 이미지에 포함. 한 번 시딩하면 재기동은 즉시.
      - seoul_db:/data
    restart: unless-stopped

volumes:
  seoul_db:
